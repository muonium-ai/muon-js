<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MuonCache TrafficLab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #7ec8ff 0%, #b06fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p.tagline {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #888;
    }

    /* ── Split-screen canvas ── */
    .sim-wrapper {
      position: relative;
      width: 100%;
      max-width: 1200px;
    }

    .sim-labels {
      display: flex;
      width: 100%;
      margin-bottom: 4px;
    }
    .sim-label {
      flex: 1;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 0;
      border-radius: 4px;
    }
    .sim-label.nocache  { color: #ff6b6b; background: rgba(255,107,107,0.08); }
    .sim-label.cached   { color: #6bffb8; background: rgba(107,255,184,0.08); }

    canvas#sim-canvas {
      display: block;
      width: 100%;
      max-width: 1200px;
      height: auto;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      background: #111114;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 18px;
      width: 100%;
      max-width: 1200px;
      justify-content: center;
    }
    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 160px;
    }
    .ctrl-group label {
      font-size: 0.72rem;
      color: #777;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .ctrl-group .ctrl-value {
      font-size: 0.75rem;
      color: #aaa;
      text-align: right;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #2a2a2e;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #7ec8ff;
      cursor: pointer;
    }
    select, button {
      background: #1a1a1e;
      color: #d0d0d0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    button:hover { background: #252530; }
    button.reset-btn { color: #ff9f9f; border-color: #553030; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: #888;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Status bar ── */
    #status-bar {
      margin-top: 10px;
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.5px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 0.75rem;
    }
    .footer a {
      color: #7ec8ff;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: #b06fff; }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1a1a1e;
      color: #d0d0d0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .share-btn:hover { background: #252530; }
  </style>
</head>
<body>

  <header>
    <h1>MuonCache TrafficLab</h1>
    <p class="tagline">A visual simulation demonstrating how caching accelerates real-world systems</p>
  </header>

  <div class="sim-wrapper">
    <div class="sim-labels">
      <div class="sim-label nocache">&#9747; No Cache</div>
      <div class="sim-label cached">&#9889; MuonCache Enabled</div>
    </div>
    <canvas id="sim-canvas" width="1200" height="580"></canvas>
  </div>

  <!-- Interactive controls -->
  <div class="controls">
    <div class="ctrl-group">
      <label>Vehicles / min <span class="ctrl-value" id="vpm-val">120</span></label>
      <input id="vpm" type="range" min="20" max="600" step="10" value="120" />
    </div>
    <div class="ctrl-group">
      <label>Signal cycle (s) <span class="ctrl-value" id="cycle-val">60</span></label>
      <input id="cycle" type="range" min="10" max="120" step="5" value="60" />
    </div>
    <div class="ctrl-group">
      <label>Lanes <span class="ctrl-value" id="lanes-val">3</span></label>
      <input id="lanes" type="range" min="1" max="6" step="1" value="3" />
    </div>
    <div class="ctrl-group">
      <label>Time warp</label>
      <select id="warp">
        <option value="1">1×</option>
        <option value="10">10×</option>
        <option value="100">100×</option>
        <option value="1000" selected>1000×</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Traffic mode</label>
      <select id="mode">
        <option value="normal">Normal</option>
        <option value="rush">Rush Hour</option>
        <option value="festival">Festival</option>
        <option value="rain">Rain</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Country rules</label>
      <select id="country">
        <option value="india">India (free left)</option>
        <option value="us">US (strict lanes)</option>
      </select>
    </div>
    <div class="ctrl-group" style="justify-content: flex-end;">
      <button class="reset-btn" id="btn-reset">&#8635; Reset</button>
    </div>
  </div>

  <!-- Vehicle legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e05252"></div>Car (60%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e8c84a"></div>Bus (5%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5270e0"></div>Truck (10%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#52c87a"></div>Motorcycle (20%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a052e0"></div>Auto-rickshaw (5%)</div>
  </div>

  <div id="status-bar">Loading WASM…</div>

  <div class="footer">
    <a href="https://github.com/muonium-ai/muon-js" target="_blank" rel="noopener">GitHub</a>
    <span style="color:#333">|</span>
    <button class="share-btn" id="btn-share" title="Copy demo link to clipboard">&#128279; Share</button>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
