name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  rust-and-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Rust build
        run: make build

      - name: muoncache-core tests
        run: cargo test --features muoncache-core

      - name: Browser demo build
        run: make web-demo-build

      - name: Browser demo test
        run: make web-demo-test
