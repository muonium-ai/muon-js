name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  rust-and-web:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v3

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Rust build
        run: make build

      - name: mini-redis-core tests
        run: cargo test --features mini-redis-core

      - name: Browser demo build
        run: make web-demo-build

      - name: Browser demo test
        run: make web-demo-test
