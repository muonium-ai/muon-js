name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── MuonCache demo (existing) ──────────────────────────────────
      - name: Build MuonCache demo WASM
        run: make web-demo-wasm

      - name: Install npm dependencies
        working-directory: web/demo
        run: npm install

      - name: Build Vite app
        working-directory: web/demo
        # base path must match the GitHub Pages repo sub-path
        run: VITE_BASE_PATH=/muon-js/ npm run build

      # ── TrafficLab demo ────────────────────────────────────────────
      - name: Build TrafficLab WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown \
            --manifest-path trafficlab/Cargo.toml
          mkdir -p web/trafficlab/pkg
          wasm-bindgen --target web --out-dir web/trafficlab/pkg \
            trafficlab/target/wasm32-unknown-unknown/release/trafficlab.wasm

      - name: Copy TrafficLab web assets
        run: |
          cp trafficlab/index.html web/trafficlab/
          cp trafficlab/app.js    web/trafficlab/

      # ── Assemble combined site ─────────────────────────────────────
      # Layout:
      #   _site/              → https://muonium-ai.github.io/muon-js/
      #   _site/trafficlab/   → https://muonium-ai.github.io/muon-js/trafficlab/
      - name: Assemble site
        run: |
          mkdir -p _site/trafficlab
          cp -r web/demo/dist/. _site/
          cp -r web/trafficlab/. _site/trafficlab/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
